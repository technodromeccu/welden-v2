[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SLA sweep — every hour on weekdays during business hours (8am–5pm IST)
[functions."sla-sweep"]
  schedule = "0 8-17 * * 1-5"

# Daily backups — 8:30am and 1:30pm IST (UTC+5:30, so 3:00 and 8:00 UTC)
[functions."backup-run"]
  schedule = "30 3,8 * * *"
